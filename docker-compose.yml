
services:
  app:
    build: ./app
    container_name: app
    restart: unless-stopped
    networks:
      - internal


  nginx1:
    image: nginx:1.31-alpine
    container_name: nginx1
    volumes:
      - ./nginx1.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8081:80"
    networks:
      - internal
  
  
  nginx2:
    image: nginx:1.31-alpine
    container_name: nginx2
    volumes:
      - ./nginx2.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8082:80"
    networks:
      - internal
  

  nginx3:
    image: nginx:1.31-alpine
    container_name: nginx3
    volumes:
      - ./nginx3.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8083:80"
    networks:
      - internal
  

  nginx4:
    image: nginx:1.31-alpine
    container_name: nginx4
    volumes:
      - ./nginx4.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8084:80"
    networks:
      - internal

networks:
  internal:
    driver: bridge