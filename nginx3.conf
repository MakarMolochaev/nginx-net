server {
    listen 80;
    root /usr/share/nginx/html;

    location / {
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_pass http://app:8080;
    }
}

server {
    listen 81;
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://app:8080;
    }
}